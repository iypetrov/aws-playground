---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-cpx-lab52-de
  namespace: istio-ingress
spec:
  secretName: app-cpx-lab52-de-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  subject:
    organizations:
      - cpx-lab52-de
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
    rotationPolicy: Always
  usages:
    - server auth
    - client auth
  dnsNames:
    - app.cpx-lab52.de 
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
